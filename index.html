function loadAllRecords(){
  const all=[];
  Object.entries(FORM_STORAGE_KEYS).forEach(([fk,key])=>{
    const recs=loadLocal(key,[]);
    all.push(...recs);
  });
  // Sort by createdAt desc
  return all.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
}
async function saveRecord(formKey, records){
  // 1. Guardado local (no lo quitamos)
  saveLocal(FORM_STORAGE_KEYS[formKey]||FORMS_KEY, records);

  try {
    const ultimo = records[records.length - 1];

    // 2. Guardar en Supabase (DB)
    await supabase
      .from('registros_calidad')
      .insert([{
        form_key: formKey,
        datos: ultimo,
        creado_en: new Date().toISOString()
      }]);

    // 3. Enviar a backend (Odoo)
    await fetch('http://localhost:3000/enviar-odoo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ registro: ultimo })
    });

  } catch (err) {
    console.error("Error en guardado externo:", err);
  }
}

function getMonthDays(){
  const today=new Date(),year=today.getFullYear(),month=today.getMonth();
  const days=new Date(year,month+1,0).getDate();
  const result=[];
  for(let d=1;d<=days;d++){
    const date=new Date(year,month,d);
    result.push({dateStr:`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,label:String(d)});
  }
  return result;
}

function saveLocal(key,data){try{localStorage.setItem(key,JSON.stringify(data));}catch(e){}}
function loadLocal(key,def){try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch(e){return def;}}

function initValues(fk){
  const v={};
  (AREA_FORMS[fk]?.fields||[]).forEach(f=>{
    if(f.type==="check") v[f.key+"_check"]=null;
    else if(f.type==="check_with_input"){v[f.key+"_check"]=null;v[f.key+"_val"]="";}
    else if(f.type==="check_bi") v[f.key+"_check"]=null; // solo SI cumple / NO cumple
    else if(f.type==="multi_text") v[f.key]=[""]; // array of entries
    else if(f.type==="producto_list") v[f.key]=[{producto:"",lote:"",cantidad:""}]; // linked rows
    else if(f.type==="producto_info_list") v[f.key]=[{producto:"",lote:"",cantidad:"",muestrear:""}]; // linked info rows
    else v[f.key]=""; // text, date, group_text
  });
  return v;
}
function calcScore(fields,values){
  const cf=fields.filter(f=>f.type==="check"||f.type==="check_with_input"||f.type==="check_bi");
  if(!cf.length) return null;
  return{pass:cf.filter(f=>values[f.key+"_check"]===true).length,fail:cf.filter(f=>values[f.key+"_check"]===false).length,na:cf.filter(f=>values[f.key+"_check"]==="na").length,total:cf.length};
}
function getGroups(flds){
  const g={};
  flds.filter(f=>f.type==="check"||f.type==="check_with_input"||f.type==="check_bi").forEach(f=>{
    const gn=f.group||"Lista de verificación";
    if(!g[gn]) g[gn]=[];
    g[gn].push(f);
  });
  return g;
}

function getTextGroups(flds){

}

// ─── CALCULADORA DE CAJAS ─────────────────────────────────────────────────────
function calcCajas(producto, piezas){
  if(!producto || !piezas || isNaN(parseInt(piezas))) return null;
  const pz = parseInt(piezas);
  const p = producto.toLowerCase();
  
  // Six pack - calcula tarimas
  if(p.includes('six pack')){
    const tarimas = Math.floor(pz / 126);
    const sueltas = pz % 126;
    return { tipo:'tarimas', completas:tarimas, sueltas };
  }
  // Cubetas - manual
  if(p.includes('cubeta')) return null;
  
  // 750gr
  if(p.includes('750')) return { tipo:'cajas', div:16, completas:Math.floor(pz/16), sueltas:pz%16 };
  // 530gr
  if(p.includes('530')) return { tipo:'cajas', div:12, completas:Math.floor(pz/12), sueltas:pz%12 };
  // 400gr (consome o bajo en sodio)
  if(p.includes('400')) return { tipo:'cajas', div:24, completas:Math.floor(pz/24), sueltas:pz%24 };
  // 350gr (consome o bajo en sodio)
  if(p.includes('350')) return { tipo:'cajas', div:18, completas:Math.floor(pz/18), sueltas:pz%18 };
  // 220gr
  if(p.includes('220')) return { tipo:'cajas', div:12, completas:Math.floor(pz/12), sueltas:pz%12 };
  // 130gr
  if(p.includes('130')) return { tipo:'cajas', div:12, completas:Math.floor(pz/12), sueltas:pz%12 };
  // Pesaj 650gr — pz / 12
  if(p.includes('pesaj')) return { tipo:'cajas', div:12, completas:Math.floor(pz/12), sueltas:pz%12 };
  // Salsas
  if(p.includes('salsa')) return { tipo:'cajas', div:12, completas:Math.floor(pz/12), sueltas:pz%12 };
  // Rice caja 12pz
  if(p.includes('rice') && p.includes('12')) return { tipo:'cajas', div:12, completas:Math.floor(pz/12), sueltas:pz%12 };
  // Konjac caja 12pz
  if(p.includes('konjac') && p.includes('12')) return { tipo:'cajas', div:12, completas:Math.floor(pz/12), sueltas:pz%12 };
  
  return null;
}

function fmtCajas(resultado){
  if(!resultado) return null;
  const {tipo, completas, sueltas} = resultado;
  if(tipo === 'tarimas'){
    return sueltas > 0 ? completas+" tarimas + "+sueltas+" pz sueltas" : completas+" tarimas completas";
  }
  return sueltas > 0 ? completas+" cajas + "+sueltas+" pz sueltas" : completas+" cajas completas";
}

    const canvas=canvasRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    const PL=45,PR=20,PT=20,PB=50;
    const CW=W-PL-PR,CH=H-PT-PB;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
    // Y grid
    [0,5,10,15,20,25,30,35,40,45,50].forEach(t=>{
      const y=PT+CH-(t/CHART_MAX)*CH;
      ctx.strokeStyle="#e5e7eb"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(PL,y); ctx.lineTo(PL+CW,y); ctx.stroke();
      ctx.fillStyle="#666"; ctx.font="10px Arial"; ctx.textAlign="right";
      ctx.fillText(`${t}°`,PL-5,y+4);
    });
    // Range band
    const yMin=PT+CH-(TEMP_MIN/CHART_MAX)*CH;
    const yMax=PT+CH-(TEMP_MAX/CHART_MAX)*CH;
    ctx.fillStyle="rgba(34,197,94,0.07)"; ctx.fillRect(PL,yMax,CW,yMin-yMax);
    ctx.strokeStyle="rgba(34,197,94,0.35)"; ctx.setLineDash([4,4]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PL,yMin); ctx.lineTo(PL+CW,yMin); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PL,yMax); ctx.lineTo(PL+CW,yMax); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(34,197,94,0.6)"; ctx.font="8px Arial"; ctx.textAlign="left";
    ctx.fillText("25°C",PL+3,yMax-3); ctx.fillText("15°C",PL+3,yMin+10);
    // X axis
    const areaKey=area==="Almacén 1"?"alm1":"alm2";
    const areaRecs=records[areaKey]||[];
    const byDay={};
    areaRecs.forEach(r=>{if(!byDay[r.date]) byDay[r.date]=[];byDay[r.date].push(r);});
    const days=MONTH_DAYS;
    const bW=CW/days.length;
    days.forEach((day,i)=>{
      const x=PL+i*bW+bW/2;
      if(day.dateStr===TODAY){ctx.fillStyle="rgba(245,158,11,0.07)";ctx.fillRect(PL+i*bW,PT,bW,CH);}
      if(parseInt(day.label)%5===0||day.dateStr===TODAY){
        ctx.fillStyle=day.dateStr===TODAY?"#d97706":"#999";
        ctx.font=day.dateStr===TODAY?"bold 9px Arial":"9px Arial";
        ctx.textAlign="center"; ctx.fillText(day.label,x,PT+CH+14);
      }
    });
    // Points & lines
    const pts=[];
    days.forEach((day,i)=>{
      (byDay[day.dateStr]||[]).forEach(r=>{
        const x=PL+i*bW+bW/2;
        const y=PT+CH-(r.temp/CHART_MAX)*CH;
        pts.push({x,y,temp:r.temp});
      });
    });
    if(pts.length>1){
      ctx.strokeStyle="#3b82f6"; ctx.lineWidth=2;
      ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
    }
    pts.forEach(p=>{
      const ok=p.temp>=TEMP_MIN&&p.temp<=TEMP_MAX;
      const col=ok?"#22c55e":"#ef4444";
      ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fillStyle=col+"33"; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      ctx.fillStyle=col; ctx.font="bold 9px Arial"; ctx.textAlign="center";
      ctx.fillText(`${p.temp}°`,p.x,p.y-8);
    });
    // Axes
    ctx.strokeStyle="#999"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PL,PT); ctx.lineTo(PL,PT+CH); ctx.lineTo(PL+CW,PT+CH); ctx.stroke();
    ctx.fillStyle="#333"; ctx.font="9px Arial"; ctx.textAlign="center";
    ctx.fillText(MONTH_NAME.toUpperCase(),W/2,H-6);
  },[records,area]);
  return h("canvas",{ref:canvasRef,width:800,height:280,style:{width:"100%",height:"auto",borderRadius:6,display:"block",background:"#111"}});
}

// ─── MÓDULO CALENDARIO ────────────────────────────────────────────────────────
function CalendarModule({onBack, allRecords}){
  const now = new Date();
  const [viewYear, setViewYear] = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());

  const REQUIRED_FORMS = {
    "Almacén 1": ["alm1_pt","alm1_mp"],
    "Almacén 2": ["alm2_pt","alm2_mp"],
  };
  const ALMACENES = Object.keys(REQUIRED_FORMS);

  // Build a map: date -> { almacen: Set of completed formKeys }
  function buildCompletionMap(){
    const map = {};
    allRecords.forEach(r => {
      // Normalize date - use fecha (from date picker, YYYY-MM-DD) or createdAt
      let date = r.fecha || (r.createdAt?r.createdAt.slice(0,10):null);
      // Make sure it's YYYY-MM-DD format
      if(!date||date.length<10) return;
      date = date.slice(0,10);
      if(!map[date]) map[date] = {"Almacén 1": new Set(), "Almacén 2": new Set()};
      if(r.formKey==="alm1_pt"||r.formKey==="alm1_mp") map[date]["Almacén 1"].add(r.formKey);
      if(r.formKey==="alm2_pt"||r.formKey==="alm2_mp") map[date]["Almacén 2"].add(r.formKey);
    });
    return map;
  }

  function getDayStatus(dateStr, completionMap){
    const entry = completionMap[dateStr];
    if(!entry) return "none";
    const alm1done = REQUIRED_FORMS["Almacén 1"].every(fk => entry["Almacén 1"].has(fk));
    const alm2done = REQUIRED_FORMS["Almacén 2"].every(fk => entry["Almacén 2"].has(fk));
    if(alm1done && alm2done) return "full";
    if(alm1done || alm2done) return "partial";
    return "none";
  }

  function getMonthGrid(year, month){
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const grid = [];
    for(let i=0; i<firstDay; i++) grid.push(null);
    for(let d=1; d<=daysInMonth; d++){
      const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      grid.push(ds);
    }
    return grid;
  }

  const completionMap = buildCompletionMap();
  const grid = getMonthGrid(viewYear, viewMonth);
  const todayStr = new Date().toISOString().slice(0,10);
  const monthName = new Date(viewYear, viewMonth, 1).toLocaleDateString("es-MX",{month:"long",year:"numeric"});
  const DAYS = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  const prevMonth = ()=>{ if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextMonth = ()=>{ if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };

  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const today = new Date();
  const passedDays = viewYear===today.getFullYear()&&viewMonth===today.getMonth()
    ? today.getDate() : (viewYear<today.getFullYear()||(viewYear===today.getFullYear()&&viewMonth<today.getMonth()) ? daysInMonth : 0);

  let fullDays=0, partialDays=0;
  for(let d=1; d<=passedDays; d++){
    const ds=`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const s=getDayStatus(ds,completionMap);
    if(s==="full") fullDays++;
    else if(s==="partial") partialDays++;
  }

  return h("div",{style:S.app},
    h("div",{style:S.hdr},
      h("div",null,h("div",{style:S.logo},"⬡ INSPECTPRO"),h("div",{style:S.sub},"Calendario de Cumplimiento")),
      h("button",{style:S.nBtn(false),onClick:onBack},"← Inicio")
    ),
    h("div",{style:S.body},

      // Leyenda
      h("div",{style:{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}},
        ...[
          {color:"#22c55e",bg:"#052e16",label:"Ambos almacenes completos"},
          {color:"#f59e0b",bg:"#2d1a00",label:"Un almacén completo"},
          {color:"#374151",bg:"#111",label:"Sin registros"},
        ].map(l=>h("div",{key:l.label,style:{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#666"}},
          h("div",{style:{width:14,height:14,borderRadius:3,background:l.bg,border:`1px solid ${l.color}`}}),
          l.label
        ))
      ),

      // Stats del mes
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}},
        ...[
          {label:"Días transcurridos",value:passedDays,color:"#60a5fa"},
          {label:"Completados",value:fullDays,color:"#22c55e"},
          {label:"Parciales / Sin registro",value:passedDays-fullDays,color:passedDays-fullDays>0?"#ef4444":"#22c55e"},
        ].map(s=>h("div",{key:s.label,style:{...S.card,textAlign:"center",borderColor:s.color+"44",padding:12}},
          h("div",{style:{fontSize:26,fontWeight:700,color:s.color}},s.value),
          h("div",{style:{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1,marginTop:2}},s.label)
        ))
      ),

      // Navegación del mes
      h("div",{style:{...S.card,padding:14}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}},
          h("button",{style:{background:"#222",border:"1px solid #333",borderRadius:5,padding:"6px 12px",cursor:"pointer",color:"#666",fontSize:14},onClick:prevMonth},"‹"),
          h("div",{style:{fontSize:14,fontWeight:700,color:"#f59e0b",textTransform:"capitalize"}},monthName),
          h("button",{style:{background:"#222",border:"1px solid #333",borderRadius:5,padding:"6px 12px",cursor:"pointer",color:"#666",fontSize:14},onClick:nextMonth},"›")
        ),

        // Day headers
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}},
          ...DAYS.map(d=>h("div",{key:d,style:{textAlign:"center",fontSize:10,color:"#666",fontWeight:700,padding:"4px 0"}},d))
        ),

        // Calendar grid
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
          ...grid.map((dateStr,i)=>{
            if(!dateStr) return h("div",{key:"e"+i});
            const day = parseInt(dateStr.slice(8));
            const status = getDayStatus(dateStr, completionMap);
            const isToday = dateStr===todayStr;
            const isFuture = dateStr>todayStr;

            const bg = isFuture?"transparent":status==="full"?"#052e16":status==="partial"?"#2d1a00":"#111";
            const border = isToday?"2px solid #f59e0b":status==="full"?"1px solid #166534":status==="partial"?"1px solid #92400e":"1px solid #222";
            const color = isFuture?"#333":status==="full"?"#22c55e":status==="partial"?"#f59e0b":"#555";

            // Detail for tooltip-like display
            const entry = completionMap[dateStr];
            const alm1done = entry&&REQUIRED_FORMS["Almacén 1"].every(fk=>entry["Almacén 1"].has(fk));
            const alm2done = entry&&REQUIRED_FORMS["Almacén 2"].every(fk=>entry["Almacén 2"].has(fk));

            return h("div",{key:dateStr,style:{background:bg,border,borderRadius:5,padding:"5px 2px",textAlign:"center",minHeight:44,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}},
              h("div",{style:{fontSize:12,fontWeight:isToday?700:400,color:isToday?"#f59e0b":color}},day),
              !isFuture&&h("div",{style:{display:"flex",gap:2}},
                h("div",{style:{width:6,height:6,borderRadius:"50%",background:alm1done?"#22c55e":"#374151",title:"Almacén 1"}}),
                h("div",{style:{width:6,height:6,borderRadius:"50%",background:alm2done?"#22c55e":"#374151",title:"Almacén 2"}})
              )
            );
          })
        ),

        // Leyenda de puntos
        h("div",{style:{display:"flex",gap:16,marginTop:10,justifyContent:"center"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#555"}},
            h("div",{style:{width:6,height:6,borderRadius:"50%",background:"#22c55e"}}),
            "Almacén 1"
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#555"}},
            h("div",{style:{width:6,height:6,borderRadius:"50%",background:"#22c55e"}}),
            "Almacén 2"
          )
        )
      )
    )
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
function App(){
  const [module,setModule]=useState("welcome"); // welcome | home | forms | temp | calendar
  const [activeArea,setActiveArea]=useState("almacen");
  const [currentUser,setCurrentUser]=useState(INSPECTORES[0].id);
  const [records,setRecords]=useState(()=>loadAllRecords());
  const [activeTab,setActiveTab]=useState(FORM_KEYS[0]);
  const [sel,setSel]=useState(null);
  const [fk,setFk]=useState(FORM_KEYS[0]);
  const [inspector,setInspector]=useState(()=>currentUser);
  const [fecha,setFecha]=useState(TODAY);
  const [vals,setVals]=useState(()=>initValues(FORM_KEYS[0]));
  const [notas,setNotas]=useState("");
  const [submitted,setSubmitted]=useState(false);
  const [formView,setFormView]=useState("home"); // home | form | history | detail
  const [selectedSection,setSelectedSection]=useState(null); // null | 'consome' | 'frascos'

  const openForm=key=>{setFk(key);setVals(initValues(key));setNotas("");setSelectedSection(null);setInspector(currentUser);setFormView("form");setModule("forms");};
  const setV=(k,v)=>setVals(prev=>({...prev,[k]:v}));
  const fd=AREA_FORMS[fk];
  const fields=fd?.fields||[];
  const checkFs=fields.filter(f=>f.type==="check"||f.type==="check_with_input"||f.type==="check_bi");
  const textFs=fields.filter(f=>(f.type==="text"||f.type==="date"||f.type==="multi_text"||f.type==="producto_info_list")&&!f.group_text);
  const textGroupFs=getTextGroups(fields);
  const allCk=checkFs.every(f=>vals[f.key+"_check"]!==null);
  const allTx=textFs.every(f=>{
      if(f.optional) return true;
      if(f.type==="multi_text") return Array.isArray(vals[f.key])&&vals[f.key].some(v=>v!=="");
      if(f.type==="producto_info_list") return Array.isArray(vals[f.key])&&vals[f.key].some(r=>r.producto!=="");
      return vals[f.key]!=="";
    })&&
    Object.values(textGroupFs).flat().filter(f=>f.type!=="check_bi").every(f=>{
      if(f.type==="multi_text") return Array.isArray(vals[f.key])&&vals[f.key].some(v=>v!=="");
      if(f.type==="producto_list") return Array.isArray(vals[f.key])&&vals[f.key].some(r=>r.producto!=="");
      return vals[f.key]!=="";
    });
  const allOk=allCk&&allTx;
  const score=calcScore(fields,vals);

  const OPTIONAL_GROUPS_CONST=["Consome y/o Salsa","Frascos y Tapas"];
  function calcVisibleScore(){
    if(fk!=="recepcion") return score;
    const allGrps=getGroups(fields);
    const mandatoryFields=Object.entries(allGrps)
      .filter(([gn])=>!OPTIONAL_GROUPS_CONST.includes(gn))
      .flatMap(([,gf])=>gf);
    const optFields=selectedSection
      ?(allGrps[selectedSection==="consome"?"Consome y/o Salsa":"Frascos y Tapas"]||[])
      :[];
    return calcScore([...mandatoryFields,...optFields], vals);
  }

  function submit(){
    const visibleScore=calcVisibleScore();
    const inspData=getInspector(inspector);

    // For recepcion: remove fields and values of the non-selected optional section
    const OPTIONAL_GROUPS_SUBMIT=["Consome y/o Salsa","Frascos y Tapas"];
    let savedFields=fields;
    let savedVals={...vals};
    if(fk==="recepcion"){
      const activeGroupName=selectedSection==="consome"?"Consome y/o Salsa":selectedSection==="frascos"?"Frascos y Tapas":null;
      // Keep only fields that are NOT in optional groups, OR are in the active optional group
      savedFields=fields.filter(f=>!f.group||!OPTIONAL_GROUPS_SUBMIT.includes(f.group)||(f.group===activeGroupName));
      // Remove values of non-selected optional fields
      const removedKeys=fields.filter(f=>f.group&&OPTIONAL_GROUPS_SUBMIT.includes(f.group)&&f.group!==activeGroupName).map(f=>f.key);
      removedKeys.forEach(k=>{delete savedVals[k+"_check"];delete savedVals[k+"_val"];});
    }

    const rec={id:genId(),formKey:fk,area:fd.area,title:fd.title,inspector:inspData.name,inspectorId:inspector,inspectorPuesto:inspData.puesto,fecha,values:savedVals,fields:savedFields,score:visibleScore,selectedSection,notas,createdAt:new Date().toISOString()};
    const formRecs=loadFormRecords(fk);
    const formNr=[rec,...formRecs];
    saveRecord(fk, formNr);
    setRecords(loadAllRecords());
    setSubmitted(true);
    setTimeout(()=>{setSubmitted(false);setFormView("history");setVals(initValues(fk));setNotas("");},1500);
  }

  function deleteRecord(id, inspectorName){
    const current=getInspector(currentUser);
    if(current.name!==inspectorName){
      alert("Solo "+inspectorName+" puede eliminar este registro.");
      return;
    }
    // Find which form this record belongs to and delete from correct storage
    const formKey=records.find(r=>r.id===id)?.formKey;
    if(formKey){
      const formRecs=loadFormRecords(formKey).filter(r=>r.id!==id);
      saveRecord(formKey, formRecs);
    }
    setRecords(loadAllRecords()); setFormView("history");
  }

  // ── Módulo temperaturas
  if(module==="temp") return h(TempModule,{onBack:()=>setModule("home")});
  if(module==="calendar") return h(CalendarModule,{onBack:()=>setModule("home"),allRecords:records});

  // ── BIENVENIDA
  if(module==="welcome"){
    const frase=getFraseDelDia();
    const greeting=new Date().getHours()<12?"¡Buenos días! ☀️":new Date().getHours()<18?"¡Buenas tardes! 🌤️":"¡Buenas noches! 🌙";

      h("div",{style:{textAlign:"center",marginBottom:28}},
        h("div",{style:{fontSize:52,marginBottom:6,color:"#f59e0b"}},"⬡"),

        h("div",{style:{fontSize:11,color:"#666",letterSpacing:2,marginTop:4,marginBottom:12}},"Sistema de inspección y calidad"),
        h("div",{style:{fontSize:16,color:"#666"}},greeting),
        h("div",{style:{fontSize:13,color:"#666",marginTop:4}},"Bienvenido a InspectPro")

      h("div",{style:{background:"#0a1a0a",border:"1px solid #166534",borderRadius:8,padding:"16px 20px",marginBottom:28,maxWidth:480,width:"100%",textAlign:"center"}},

        frase.autor&&h("div",{style:{fontSize:11,color:"#666",marginTop:8}},"— "+frase.autor)
      ),

        h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
          ...INSPECTORES.map(i=>{
            const areaKey=Object.keys(AREAS_EMPRESA).find(k=>AREAS_EMPRESA[k].inspectores.includes(i.id))||"almacen";
            const area=AREAS_EMPRESA[areaKey];
            return h("button",{key:i.id,
              onClick:()=>{setCurrentUser(i.id);setInspector(i.id);setActiveArea(areaKey);setModule("home");},

              h("div",{style:{width:42,height:42,borderRadius:"50%",background:"#222",border:"1px solid #333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},"👤"),

      h("div",{style:S.nav},
        h("div",{style:{display:"flex",alignItems:"center",gap:6,background:"#111",border:"1px solid #f59e0b44",borderRadius:6,padding:"4px 10px"}},

              );
            }),
            // Optional section selector (only for recepcion)
            isRecepcion&&h("div",{style:secCard("opcional")},
              h("div",{style:secTitle("opcional")},"Sección opcional — elige una"),
              h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
                ...[
                  {key:"consome",label:"Consome y/o Salsa",icon:"🍲",color:"#f59e0b"},
                  {key:"frascos",label:"Frascos y Tapas",icon:"🫙",color:"#60a5fa"},
                ].map(opt=>h("button",{key:opt.key,onClick:()=>setSelectedSection(selectedSection===opt.key?null:opt.key),style:{background:selectedSection===opt.key?opt.color+"22":"#111",border:`2px solid ${selectedSection===opt.key?opt.color:opt.color+"33"}`,borderRadius:8,padding:"14px",cursor:"pointer",textAlign:"center"}},
                  h("div",{style:{fontSize:24,marginBottom:6}},opt.icon),
                  h("div",{style:{fontSize:12,fontWeight:700,color:selectedSection===opt.key?opt.color:"#666"}},opt.label),
                  h("div",{style:{fontSize:10,color:selectedSection===opt.key?opt.color+"aa":"#555",marginTop:3}},selectedSection===opt.key?"✓ Seleccionado — toca para quitar":"Toca para activar")
                ))
              )
            ),
            // Active optional group fields
            isRecepcion&&selectedSection&&activeOptionalFields.length>0&&h("div",{style:{...S.card,borderColor:selectedSection==="consome"?"#f59e0b44":"#60a5fa44"}},
              h("div",{style:S.grpHdr},
                h("span",{style:{fontSize:11,fontWeight:700,color:selectedSection==="consome"?"#f59e0b":"#60a5fa"}},selectedSection==="consome"?"🍲 Consome y/o Salsa":"🫙 Frascos y Tapas"),
                h("span",{style:{fontSize:10,color:"#666"}},`${activeOptionalFields.filter(f=>vals[f.key+"_check"]!==null).length}/${activeOptionalFields.length}`)
              ),
              ...activeOptionalFields.map((f,i)=>{
                const v=vals[f.key+"_check"];
                return h("div",{key:f.key,style:S.chkRow(v)},
                  h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:6}},
                    h("span",{style:{fontSize:12,flex:1,minWidth:120,paddingRight:6}},h("span",{style:{color:"#666",marginRight:4}},`${i+1}.`),f.label),
                    h("div",{style:S.btnGrp},
                      h("button",{style:S.cbtn(v===true?"#0f0f0f":"#22c55e",v===true?"#22c55e":"#1a2e1a"),onClick:()=>setV(f.key+"_check",true)},"✓ SÍ"),
                      h("button",{style:S.cbtn(v===false?"#0f0f0f":"#ef4444",v===false?"#ef4444":"#2a1010"),onClick:()=>setV(f.key+"_check",false)},"✗ NO"),
                      h("button",{style:S.cbtn(v==="na"?"#0f0f0f":"#818cf8",v==="na"?"#818cf8":"#1a1a2e"),onClick:()=>setV(f.key+"_check","na")},"— N/A")
                    )
                  )
                );
              })
            ),
            // Score
            (()=>{const vs=calcVisibleScore(); return vs&&visibleAllCk&&h("div",{style:secCard("resultado")},
              h("div",{style:S.secTit},"Resultado preliminar"),
              h("div",{style:{display:"flex",gap:18,marginBottom:8}},
                h("span",{style:{color:"#22c55e",fontSize:12}},`✓ Cumple: ${vs.pass}`),
                h("span",{style:{color:"#ef4444",fontSize:12}},`✗ No cumple: ${vs.fail}`),
                h("span",{style:{color:"#818cf8",fontSize:12}},`— N/A: ${vs.na}`)
              ),
              h(StatusBadge,{score:vs})
            );})(),
            h("div",{style:secCard("observaciones")},
              h("label",{style:S.lbl},"Observaciones"),
              h("textarea",{style:S.ta,value:notas,onChange:e=>setNotas(e.target.value),placeholder:"Observaciones, acciones correctivas o notas relevantes..."})
            ),
            h("button",{style:{...S.pBtn,opacity:visibleAllOk?1:0.4},disabled:!visibleAllOk,onClick:submit},"GUARDAR REGISTRO")
          )
        )
      );
    }

    // HISTORY
    if(formView==="history"){
      const grouped={};
      FORM_KEYS.forEach(fk=>{ grouped[fk]=records.filter(r=>r.formKey===fk).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); });
      const tabRecs=grouped[activeTab]||[];
      const col=FORM_COLORS[activeTab];
      const def=AREA_FORMS[activeTab];

      return h("div",{style:S.app},
        h("div",{style:S.hdr},
          h("div",null,h("div",{style:S.logo},"⬡ INSPECTPRO"),h("div",{style:S.sub},"Historial de registros")),
          h("div",{style:S.nav},h("button",{style:S.nBtn(false),onClick:()=>setModule("home")},"← Inicio"))
        ),
        h("div",{style:S.body},

          // ── Tabs de formularios (scroll horizontal en móvil)
          h("div",{style:{overflowX:"auto",marginBottom:16,paddingBottom:4}},
            h("div",{style:{display:"flex",gap:8,minWidth:"max-content"}},
              ...FORM_KEYS.map(fk=>{
                const d=AREA_FORMS[fk], c=FORM_COLORS[fk], count=grouped[fk]?.length||0;
                const isActive=activeTab===fk;
                return h("button",{key:fk,onClick:()=>setActiveTab(fk),style:{
                  display:"flex",flexDirection:"column",alignItems:"center",gap:4,
                  padding:"10px 14px",background:isActive?c+"22":"#111",
                  border:`2px solid ${isActive?c:c+"33"}`,borderRadius:8,
                  cursor:"pointer",minWidth:90,flexShrink:0
                }},
                  h("span",{style:{fontSize:20}},FORM_ICONS[fk]),
                  h("span",{style:{fontSize:9,fontWeight:700,color:isActive?c:"#555",textAlign:"center",lineHeight:1.2,maxWidth:80}},d.area),
                  h("span",{style:{background:isActive?c:"#222",color:isActive?"#0f0f0f":"#555",borderRadius:8,padding:"1px 7px",fontSize:9,fontWeight:700,marginTop:2}},count)
                );
              })
            )
          ),

          // ── Header del formulario activo
          h("div",{style:{...S.card,borderColor:col+"55",padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}},
            h("span",{style:{fontSize:28}},FORM_ICONS[activeTab]),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:13,fontWeight:700,color:col}},def.title),
              h("div",{style:{fontSize:11,color:"#555",marginTop:2}},def.area+" · "+tabRecs.length+" registro"+(tabRecs.length!==1?"s":""))
            )
          ),

          // ── Lista de registros
          tabRecs.length===0
            ? h("div",{style:{textAlign:"center",padding:48,color:"#555",background:"#111",borderRadius:8,border:"1px solid #222"}},
                h("div",{style:{fontSize:40,marginBottom:10}},"📋"),
                h("div",{style:{fontSize:13,fontWeight:700,marginBottom:4}},"Sin registros"),
                h("div",{style:{fontSize:11,color:"#555"}},"Aún no hay inspecciones para este formulario")
              )
            : h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
                ...tabRecs.map(r=>{
                  const sc=r.score;
                  const app=sc?sc.total-(sc.na||0):0;
                  const pct=sc&&app>0?Math.round((sc.pass/app)*100):null;
                  const statusColor=pct===null?"#6366f1":pct>=80?"#22c55e":pct>=50?"#f59e0b":"#ef4444";
                  const statusLabel=pct===null?"REGISTRADO":pct>=80?"APROBADO":pct>=50?"OBSERVACIONES":"REPROBADO";
                  return h("div",{key:r.id,style:{background:"#111",border:`1px solid ${col}33`,borderRadius:8,overflow:"hidden",cursor:"pointer"},onClick:()=>{setSel(r);setFormView("detail");}},
                    // Color bar top
                    h("div",{style:{height:3,background:statusColor}}),
                    h("div",{style:{padding:"12px 14px",display:"flex",alignItems:"center",gap:12}},
                      // Date block
                      h("div",{style:{background:col+"22",border:`1px solid ${col}44`,borderRadius:6,padding:"6px 10px",textAlign:"center",minWidth:52,flexShrink:0}},
                        h("div",{style:{fontSize:18,fontWeight:700,color:col}},r.fecha?r.fecha.slice(8):"?"),
                        h("div",{style:{fontSize:9,color:col,textTransform:"uppercase"}},r.fecha?new Date(r.fecha+"T12:00:00").toLocaleDateString("es-MX",{month:"short"}):"")
                      ),
                      // Info
                      h("div",{style:{flex:1,minWidth:0}},
                        h("div",{style:{fontSize:12,fontWeight:700,color:"#e5e5e5",marginBottom:3}},
                          FORM_ICONS[r.formKey]+" "+r.area
                        ),
                        h("div",{style:{fontSize:10,color:"#555"}},fmtDate(r.createdAt))
                      ),
                      // Badge
                      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}},
                        pct!==null&&h("div",{style:{fontSize:16,fontWeight:700,color:statusColor}},pct+"%"),
                        h("span",{style:{background:statusColor+"22",color:statusColor,border:`1px solid ${statusColor}55`,borderRadius:4,padding:"2px 7px",fontSize:9,fontWeight:700}},statusLabel),
                        h("span",{style:{color:"#555",fontSize:12,marginTop:2}},"›")
                      )
                    )
                  );
                })
              )
        )
      );
    }

    // DETAIL
    if(formView==="detail"&&sel){
      const scf=sel.fields.filter(f=>f.type==="check"||f.type==="check_with_input"||f.type==="check_bi");
      const stf=sel.fields.filter(f=>(f.type==="text"||f.type==="date"||f.type==="multi_text"||f.type==="producto_info_list")&&!f.group_text);
      const stGroupFs=getTextGroups(sel.fields);
      const ac=FORM_COLORS[sel.formKey]||"#f59e0b";
      const dg={};
      scf.forEach(f=>{const g=f.group||"Lista de verificación";if(!dg[g])dg[g]=[];dg[g].push(f);});

      function renderDetailField(f){
        if(f.type==="check_bi"){
          const v=sel.values[f.key+"_check"];
          return h("div",{key:f.key,style:{marginBottom:12}},
            h("div",{style:{fontSize:9,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:4}},f.label),
            h("span",{style:{background:v===true?"#052e16":"#2d0a0a",color:v===true?"#22c55e":"#ef4444",border:`1px solid ${v===true?"#166534":"#991b1b"}`,borderRadius:4,padding:"3px 10px",fontSize:10,fontWeight:700}},
              v===true?"✓ SÍ CUMPLE":"✗ NO CUMPLE"
            )
          );
        }
        if(f.type==="multi_text"){
          const entries=Array.isArray(sel.values[f.key])?sel.values[f.key].filter(v=>v!==""):[];
          return h("div",{key:f.key,style:{marginBottom:12}},
            h("div",{style:{fontSize:9,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:4}},f.label),
            entries.length===0?h("div",{style:{fontSize:12,color:"#555"}},"—"):
            entries.map((e,i)=>h("div",{key:i,style:{fontSize:12,padding:"4px 0",borderBottom:"1px solid #1a1a1a"}},`${i+1}. ${e}`))
          );
        }
        if(f.type==="producto_list"){
          const rows=Array.isArray(sel.values[f.key])?sel.values[f.key].filter(r=>r.producto!==""):[];
          return h("div",{key:f.key,style:{marginBottom:12}},
            h("div",{style:{fontSize:9,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:6}},f.label),
            rows.length===0?h("div",{style:{fontSize:12,color:"#555"}},"—"):h("div",null,
              h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1.5fr",gap:6,marginBottom:4,borderBottom:"1px solid #2a2a2a",paddingBottom:4}},
                h("span",{style:{fontSize:9,color:"#f59e0b",letterSpacing:1,textTransform:"uppercase"}},"Producto"),
                h("span",{style:{fontSize:9,color:"#f59e0b",letterSpacing:1,textTransform:"uppercase"}},"No. Lote"),
                h("span",{style:{fontSize:9,color:"#f59e0b",letterSpacing:1,textTransform:"uppercase"}},"Piezas"),
                h("span",{style:{fontSize:9,color:"#60a5fa",letterSpacing:1,textTransform:"uppercase"}},"Cajas / Tarimas")
              ),
              ...rows.map((r,i)=>{
                const cajas=calcCajas(r.producto,r.cantidad);
                const cajasStr=fmtCajas(cajas);
                return h("div",{key:i,style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1.5fr",gap:6,padding:"5px 0",borderBottom:"1px solid #1a1a1a"}},
                  h("span",{style:{fontSize:12}},r.producto||"—"),
                  h("span",{style:{fontSize:12,color:"#666"}},r.lote||"—"),
                  h("span",{style:{fontSize:12,color:"#666"}},r.cantidad||"—"),
                  h("span",{style:{fontSize:11,color:"#60a5fa",fontWeight:600}},cajasStr||"—")
                );
              })
            )
          );
        }
        // default text/date
        return h("div",{key:f.key,style:{marginBottom:12}},
          h("div",{style:{fontSize:9,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:2}},f.label),
          h("div",{style:{fontSize:12}},sel.values[f.key]||"—")
        );
      }

      return h("div",{style:S.app},
        h("div",{style:S.hdr},
          h("div",null,h("div",{style:S.logo},"⬡ INSPECTPRO"),h("div",{style:S.sub},"Detalle del registro")),
          h("div",{style:S.nav},
            h("button",{style:S.pdfBtn,onClick:()=>exportPDF(sel)},"📄 Exportar PDF"),
            h("button",{style:{background:"#2d0a0a",color:"#ef4444",border:"1px solid #991b1b",borderRadius:4,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:700},onClick:()=>deleteRecord(sel.id,sel.inspector)},"🗑️ Eliminar"),
            h("button",{style:S.nBtn(false),onClick:()=>setFormView("history")},"← Historial")
          )
        ),
        h("div",{style:S.body},
          h("div",{style:{...S.card,borderColor:ac+"44"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
              h("div",null,
                h("span",{style:{background:ac+"22",color:ac,border:`1px solid ${ac}44`,borderRadius:4,padding:"2px 8px",fontSize:9,fontWeight:700,display:"inline-block",marginBottom:5}},sel.area),
                h("div",{style:{fontSize:13,fontWeight:700,marginBottom:3}},sel.title),
                h("div",{style:{fontSize:13,fontWeight:700}},sel.inspector),
                h("div",{style:{fontSize:11,color:"#60a5fa"}},sel.inspectorPuesto||"Inspector"),
                h("div",{style:{fontSize:10,color:"#555"}},`${fmtDate(sel.createdAt)} · Fecha: ${sel.fecha}`)
              ),
              h(StatusBadge,{score:sel.score})
            ),
            sel.score&&h("div",{style:{display:"flex",gap:14,paddingTop:9,borderTop:"1px solid #222"}},
              h("span",{style:{color:"#22c55e",fontSize:11}},`✓ Cumple: ${sel.score.pass}`),
              h("span",{style:{color:"#ef4444",fontSize:11}},`✗ No cumple: ${sel.score.fail}`),
              h("span",{style:{color:"#818cf8",fontSize:11}},`— N/A: ${sel.score.na||0}`),
              h("span",{style:{color:"#555",fontSize:11}},`Total: ${sel.score.total}`)
            )
          ),
          // Regular text fields (no group_text)
          stf.length>0&&h("div",{style:S.card},
            h("div",{style:S.secTit},"Información registrada"),
            h("div",null,...stf.map(f=>{
              if(f.type==="multi_text"){
                const entries=Array.isArray(sel.values[f.key])?sel.values[f.key].filter(v=>v!==""):[];
                return h("div",{key:f.key,style:{marginBottom:12}},
                  h("div",{style:{fontSize:9,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:4}},f.label),
                  entries.length===0?h("div",{style:{fontSize:12,color:"#555"}},"—"):
                  entries.map((e,i)=>h("div",{key:i,style:{fontSize:12,padding:"3px 0",borderBottom:"1px solid #1a1a1a"}},`${i+1}. ${e}`))
                );
              }
              if(f.type==="producto_info_list"){
                const rows=Array.isArray(sel.values[f.key])?sel.values[f.key].filter(r=>r.producto!==""):[];
                return h("div",{key:f.key,style:{marginBottom:12}},
                  h("div",{style:{fontSize:9,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:6}},"Productos"),
                  rows.length===0?h("div",{style:{fontSize:12,color:"#555"}},"—"):h("div",null,
                    h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:5,marginBottom:4,borderBottom:"1px solid #2a2a2a",paddingBottom:4}},
                      h("span",{style:{fontSize:9,color:"#f59e0b",textTransform:"uppercase"}},"Producto y/o Servicio"),
                      h("span",{style:{fontSize:9,color:"#f59e0b",textTransform:"uppercase"}},"No. Lote"),
                      h("span",{style:{fontSize:9,color:"#f59e0b",textTransform:"uppercase"}},"Cantidad"),
                      h("span",{style:{fontSize:9,color:"#f59e0b",textTransform:"uppercase"}},"A muestrear")
                    ),
                    ...rows.map((r,i)=>h("div",{key:i,style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:5,padding:"5px 0",borderBottom:"1px solid #1a1a1a"}},
                      h("span",{style:{fontSize:12}},r.producto||"—"),
                      h("span",{style:{fontSize:12,color:"#666"}},r.lote||"—"),
                      h("span",{style:{fontSize:12,color:"#666"}},r.cantidad||"—"),
                      h("span",{style:{fontSize:12,color:"#666"}},r.muestrear||"—")
                    ))
                  )
                );
              }
              return h("div",{key:f.key,style:{marginBottom:11}},
                h("div",{style:{fontSize:9,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:2}},f.label),
                h("div",{style:{fontSize:12}},sel.values[f.key]||"—")
              );
            }))
          ),
          // group_text sections
          ...Object.entries(stGroupFs).map(([gn,gf])=>h("div",{key:gn,style:S.card},
            h("div",{style:S.secTit},gn),
            ...gf.map(f=>renderDetailField(f))
          )),
          ...Object.entries(dg).map(([gn,gf])=>h("div",{key:gn,style:S.card},
            h("div",{style:{...S.grpHdr,marginBottom:10}},h("span",{style:{fontSize:11,fontWeight:700,color:"#f59e0b"}},gn)),
            ...gf.map((f,i)=>{
              const val=sel.values[f.key+"_check"];
              const ival=sel.values[f.key+"_val"];
              return h("div",{key:f.key,style:{padding:"9px 13px",background:val===true?"#052e16":val==="na"?"#1a1a2a":"#2d0a0a",borderRadius:5,marginBottom:6,border:"1px solid "+(val===true?"#166534":val==="na"?"#3730a3":"#991b1b")}},
                h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}},
                  h("span",{style:{fontSize:11,flex:1,paddingRight:8}},h("span",{style:{color:"#666",marginRight:4}},`${i+1}.`),f.label),
                  h("span",{style:{fontSize:10,color:val===true?"#22c55e":val==="na"?"#818cf8":"#ef4444",fontWeight:700,flexShrink:0}},val===true?"CUMPLE":val==="na"?"N/A":"NO CUMPLE")
                ),
                f.type==="check_with_input"&&ival&&h("div",{style:{marginTop:4,fontSize:10,color:"#666"}},
                  f.inputType==="date"?"Fecha:":"Temperatura:",
                  h("span",{style:{color:"#f59e0b",fontWeight:700,marginLeft:4}},`${ival}${f.inputType!=="date"?" °C":""}`)
                )
              );
            })
          )),
          sel.notas&&h("div",{style:S.card},
            h("div",{style:S.secTit},"Observaciones"),
            h("div",{style:{fontSize:11,color:"#666",lineHeight:1.7}},sel.notas)
          ),
          h("button",{style:{...S.pdfBtn,width:"100%",justifyContent:"center",padding:"12px"},onClick:()=>exportPDF(sel)},"📄 Exportar a PDF"),
          h("button",{style:{background:"#2d0a0a",color:"#ef4444",border:"1px solid #991b1b",borderRadius:6,padding:"11px 22px",cursor:"pointer",fontSize:12,fontWeight:700,width:"100%",marginTop:8,letterSpacing:1},onClick:()=>deleteRecord(sel.id,sel.inspector)},"🗑️ Eliminar este registro")
        )
      );
    }
  }
  return null;
}


window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:20px;font-family:monospace;background:#1a1a1a;min-height:100vh"><h2 style="color:#f59e0b">⬡ InspectPro — Error de carga</h2><p style="margin-top:12px">'+msg+'</p><p style="color:#666;margin-top:8px">Línea: '+line+' Col: '+col+'</p></div>';
  return false;
};
try {
  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:20px;font-family:monospace;background:#1a1a1a;min-height:100vh"><h2 style="color:#f59e0b">⬡ InspectPro — Error</h2><p style="margin-top:12px">'+e.message+'</p></div>';
}

</script>
</body>
</html>
